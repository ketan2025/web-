<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body
{background-image:url(images/bg1.jpg)

}


nav
{
background:black;
color:white;
width:50%;
text-align:center;
margin:auto;
box-shadow:-1px 1px 20px white;
}

nav ul
{padding:0px;
margin:auto;}

nav ul li
{list-style:none;
padding:50px;
cursor:pointer;
border-bottom:1px solid white;
}

nav ul li a:link
{color:white;
text-decoration:none;
font-size:25px;}


nav ul li a:visited
{color:white;
}


nav ul li:hover
{background:teal;}

nav ul li a:hover
{font-size:28px;
transition:0.4s;
}
/*         Media Query    */

@media only screen and (max-width: 600px)
 {
